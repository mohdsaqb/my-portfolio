<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mohd Saqib | Software Engineer & Full Stack Developer</title>
    <script>
      // GitHub Pages has no server-side rewrites, so a deep link or a hard
      // refresh on a client-side route (e.g. /my-portfolio/projects)
      // hits this 404.html instead of index.html. We encode the path into a
      // query string and redirect to the app root, where the inline script in
      // index.html restores it via history.replaceState before React mounts.
      // Adapted from https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1; // keep "/my-portfolio" (the repo name segment)
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?p=/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
