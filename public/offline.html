<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="robots" content="noindex" />
    <title>You're offline | Mohd Saqib</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1.5rem;
        background: #0f172a;
        color: #e5e7eb;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        text-align: center;
      }
      main {
        max-width: 28rem;
      }
      .icon {
        width: 4rem;
        height: 4rem;
        margin: 0 auto 1.5rem;
        border-radius: 9999px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(120deg, #3b82f6, #38bdf8);
      }
      h1 {
        font-family: 'Space Grotesk', system-ui, sans-serif;
        font-size: 1.5rem;
        margin: 0 0 0.75rem;
        color: #fff;
      }
      p {
        color: #94a3b8;
        line-height: 1.6;
        margin: 0 0 1.75rem;
      }
      button {
        cursor: pointer;
        border: none;
        border-radius: 9999px;
        padding: 0.75rem 1.75rem;
        font-size: 0.95rem;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(120deg, #3b82f6, #38bdf8);
        box-shadow: 0 0 40px rgba(59, 130, 246, 0.35);
      }
      button:focus-visible {
        outline: 3px solid #38bdf8;
        outline-offset: 3px;
      }
      .hint {
        margin-top: 1rem;
        font-size: 0.8rem;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="icon" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.24 4.24 0 00-6 0zm-4-4l2 2a7.07 7.07 0 0110 0l2-2C15.14 9.14 8.87 9.14 5 13z"
            fill="#fff"
          />
        </svg>
      </div>
      <h1>You're offline</h1>
      <p>
        This page hasn't been saved for offline use yet. Reconnect to the internet and try again — pages you've
        already visited will keep working without a connection.
      </p>
      <button type="button" onclick="location.reload()">Try again</button>
      <p class="hint">Mohd Saqib &mdash; Software Engineer &amp; Full Stack Developer</p>
    </main>
  </body>
</html>
